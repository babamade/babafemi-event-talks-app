<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechConf 2026 | Schedule</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>TechConf 2026</h1>
            <p>One day. Six talks. Infinite possibilities.</p>
        </div>
    </header>

    <main class="container">
        <section class="search-section">
            <input type="text" id="categorySearch" placeholder="Search by category or speaker (e.g., Alice, Backend, AI)...">
        </section>

        <div id="searchFeedback" class="search-feedback"></div>

        <section id="schedule" class="schedule">
            <!-- Skeleton Loading State -->
            <div class="skeleton-card">
                <div class="skeleton-text skeleton-time"></div>
                <div class="skeleton-text skeleton-title"></div>
                <div class="skeleton-text skeleton-desc"></div>
                <div class="skeleton-text skeleton-desc-short"></div>
            </div>
            <div class="skeleton-card">
                <div class="skeleton-text skeleton-time"></div>
                <div class="skeleton-text skeleton-title"></div>
                <div class="skeleton-text skeleton-desc"></div>
                <div class="skeleton-text skeleton-desc-short"></div>
            </div>
            <div class="skeleton-card">
                <div class="skeleton-text skeleton-time"></div>
                <div class="skeleton-text skeleton-title"></div>
                <div class="skeleton-text skeleton-desc"></div>
                <div class="skeleton-text skeleton-desc-short"></div>
            </div>
        </section>
    </main>

    <button id="backToTop" class="back-to-top" title="Back to Top">↑</button>

    <footer>
        <div class="container">
            <p>&copy; 2026 TechConf. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
