<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechConf 2026 | Schedule</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>TechConf 2026</h1>
            <p>One day. Six talks. Infinite possibilities.</p>
        </div>
    </header>

    <main class="container">
        <section class="search-section">
            <input type="text" id="categorySearch" placeholder="Search by category (e.g., Backend, AI, CSS)...">
        </section>

        <section id="schedule" class="schedule">
            <!-- Talks will be injected here by JavaScript -->
            <div class="loading">Loading schedule...</div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 TechConf. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
